<mat-toolbar class="admin-toolbar">
  <button mat-icon-button (click)="toggleSidenav()" aria-label="Toggle navigation">
    <mat-icon>menu</mat-icon>
  </button>
  <a routerLink="/admin" class="brand" aria-label="Poke-Singles Admin">
    <img src="assets/images/poke-singles-logo.png" alt="" class="brand-logo" />
    <span class="brand-eyebrow brand-eyebrow--inline">Poke-Singles · Admin</span>
  </a>
  <span class="spacer"></span>
  <a mat-button routerLink="/">
    <mat-icon>storefront</mat-icon>
    Ir a la tienda
  </a>
  <button
    mat-icon-button
    [matMenuTriggerFor]="adminProfileMenu"
    [attr.aria-label]="isSignedIn() ? 'Cuenta' : 'Iniciar sesión'"
  >
    <mat-icon>{{ isSignedIn() ? 'account_circle' : 'person' }}</mat-icon>
  </button>
  <mat-menu #adminProfileMenu="matMenu" xPosition="before">
    @if (!isSignedIn()) {
      <button mat-menu-item (click)="openLogin()">
        <mat-icon>login</mat-icon>
        <span>Ingresar</span>
      </button>
    } @else {
      <div mat-menu-item disabled>
        <span>{{ userDisplayName() }}</span>
      </div>
      @if (!isAdmin()) {
        <div mat-menu-item disabled>
          <span class="brand-eyebrow">Sin permisos admin</span>
        </div>
      }
      <button mat-menu-item (click)="signOut()">
        <mat-icon>logout</mat-icon>
        <span>Cerrar sesión</span>
      </button>
    }
  </mat-menu>
</mat-toolbar>

<mat-sidenav-container class="admin-container">
  <mat-sidenav mode="side" [opened]="sidenavOpen()">
    <mat-nav-list>
      @for (item of items; track item.path) {
        <a
          mat-list-item
          [routerLink]="item.path"
          routerLinkActive="active-link"
          [routerLinkActiveOptions]="{ exact: !!item.exact }"
        >
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content class="admin-content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
