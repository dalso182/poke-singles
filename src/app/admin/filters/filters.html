<app-page-header
  kicker="Catálogo"
  title="Filtros"
  sub="Clasificaciones por categoría — Rareza (multi) para singles, sub-tipos (uno) para producto sellado y accesorios"
/>

<app-underline-tabs [tabs]="tabs()" [(value)]="tab" />

@if (ready()) {
  <app-admin-card-types
    [categoryId]="activeCategoryId()"
    [slugPrefix]="activeSlugPrefix()"
    (changed)="reloadCounts()"
  />
} @else {
  <p class="filters__loading">Cargando…</p>
}
