<app-filter-bar>
  <app-search-input [(value)]="searchText" placeholder="Buscar código o nombre" />
  <app-date-range [(start)]="dateStart" [(end)]="dateEnd" />
  <span class="spacer"></span>
  <app-dropdown label="Ordenar" [options]="sortOptions" [(value)]="sort" [width]="190" />
</app-filter-bar>

@if (loading()) {
  <mat-progress-bar mode="indeterminate" />
}

<app-table-card>
  <div class="report__scroll">
    <table mat-table [dataSource]="rows()" class="app-table app-table--comfy">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let row">
          @if (row.name) {
            <strong class="report__name">{{ row.name }}</strong>
          } @else {
            <span class="is-dim">—</span>
          }
        </td>
      </ng-container>

      <ng-container matColumnDef="code">
        <th mat-header-cell *matHeaderCellDef>Código</th>
        <td mat-cell *matCellDef="let row" class="is-mono is-dim">{{ row.code }}</td>
      </ng-container>

      <ng-container matColumnDef="orders">
        <th mat-header-cell *matHeaderCellDef class="is-right">Pedidos</th>
        <td mat-cell *matCellDef="let row" class="is-right is-mono">{{ row.order_count }}</td>
      </ng-container>

      <ng-container matColumnDef="discount">
        <th mat-header-cell *matHeaderCellDef class="is-right">Descuento</th>
        <td mat-cell *matCellDef="let row" class="is-right">
          <app-money [value]="row.total_discount" />
        </td>
      </ng-container>

      <ng-container matColumnDef="revenue">
        <th mat-header-cell *matHeaderCellDef class="is-right">Ingresos</th>
        <td mat-cell *matCellDef="let row" class="is-right">
          <app-money [value]="row.total_revenue" />
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row" class="is-right">
          <app-btn variant="ghost" size="sm" (click)="goToEdit(row.id)">Editar</app-btn>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>

  @if (!loading() && rows().length === 0) {
    <p class="report__empty">Sin cupones usados en este filtro.</p>
  }

  <app-pagination-footer
    [page]="page()"
    [perPage]="pageSize()"
    [total]="total()"
    [perPageOptions]="[10, 25, 50, 100]"
    (pageChange)="onPage($event)"
    (perPageChange)="onPerPage($event)"
  />
</app-table-card>
