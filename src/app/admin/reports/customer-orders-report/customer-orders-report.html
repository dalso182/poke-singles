<app-filter-bar>
  <app-search-input [(value)]="searchText" placeholder="Buscar nombre o email" />
  <app-date-range [(start)]="dateStart" [(end)]="dateEnd" />
  <span class="spacer"></span>
  <app-dropdown label="Ordenar" [options]="sortOptions" [(value)]="sort" [width]="170" />
</app-filter-bar>

@if (loading()) {
  <mat-progress-bar mode="indeterminate" />
}

<app-table-card>
  <div class="report__scroll">
    <table mat-table [dataSource]="rows()" class="app-table app-table--comfy">
      <ng-container matColumnDef="customer">
        <th mat-header-cell *matHeaderCellDef>Cliente</th>
        <td mat-cell *matCellDef="let row">
          <strong class="report__name">{{ row.full_name || 'Sin nombre' }}</strong>
        </td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let row" class="is-mono is-dim">{{ row.email }}</td>
      </ng-container>

      <ng-container matColumnDef="orders">
        <th mat-header-cell *matHeaderCellDef class="is-right">Pedidos</th>
        <td mat-cell *matCellDef="let row" class="is-right is-mono">{{ row.order_count }}</td>
      </ng-container>

      <ng-container matColumnDef="products">
        <th mat-header-cell *matHeaderCellDef class="is-right">Productos</th>
        <td mat-cell *matCellDef="let row" class="is-right is-mono">{{ row.no_products }}</td>
      </ng-container>

      <ng-container matColumnDef="total">
        <th mat-header-cell *matHeaderCellDef class="is-right">Total</th>
        <td mat-cell *matCellDef="let row" class="is-right">
          <app-money [value]="row.total_spent" />
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row" class="is-right">
          <app-btn variant="ghost" size="sm" (click)="goToView(row.id)">Ver</app-btn>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>

  @if (!loading() && rows().length === 0) {
    <p class="report__empty">Sin pedidos en este filtro.</p>
  }

  <app-pagination-footer
    [page]="page()"
    [perPage]="pageSize()"
    [total]="total()"
    [perPageOptions]="[10, 25, 50, 100]"
    (pageChange)="onPage($event)"
    (perPageChange)="onPerPage($event)"
  />
</app-table-card>
