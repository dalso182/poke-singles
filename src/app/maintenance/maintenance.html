@if (ready()) {
  <main class="maintenance">
    <img
      src="assets/images/poke-singles-logo.png"
      alt="Poke-Singles"
      class="maintenance__logo"
    />
    @if (imageUrl(); as url) {
      <img class="maintenance__image" [src]="url" alt="" />
    } @else {
      <mat-icon class="maintenance__icon">build</mat-icon>
    }
    <h1>En mantenimiento</h1>
    <p class="muted">{{ message() }}</p>
    <button
      type="button"
      class="maintenance__dot"
      (click)="openLogin()"
      aria-label="Iniciar sesión"
    >
      .
    </button>
  </main>
}
