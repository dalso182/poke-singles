<app-header (toggleNav)="toggleSidenav()" />

<mat-sidenav-container class="user-shell-container">
  <mat-sidenav mode="side" [opened]="sidenavOpen()">
    <app-navigation />
  </mat-sidenav>
  <mat-sidenav
    position="end"
    mode="over"
    [opened]="cartDrawerOpen()"
    (closedStart)="onCartDrawerClosed()"
    class="user-shell-cart-drawer"
  >
    <app-cart-drawer />
  </mat-sidenav>
  <mat-sidenav-content class="user-shell-content">
    <div class="user-shell-main">
      <router-outlet />
    </div>
    <app-footer />
    <app-card-preview-overlay />
  </mat-sidenav-content>
</mat-sidenav-container>
