<mat-nav-list>
  @for (item of items; track item.path) {
    <a
      mat-list-item
      [routerLink]="item.path"
      routerLinkActive="active-link"
      [routerLinkActiveOptions]="{ exact: !!item.exact }"
    >
      <span matListItemTitle>{{ item.label }}</span>
    </a>
  }
</mat-nav-list>

<app-social-icons class="nav-social" />
