<section class="account">
  <header class="account__header">
    <span class="brand-eyebrow">Cuenta</span>
    <h1>Mi cuenta</h1>
  </header>

  @if (loading()) {
    <mat-progress-bar mode="indeterminate" />
  }

  <form [formGroup]="form" (ngSubmit)="onSave()" class="account__form">
    <mat-card class="account__panel">
      <mat-card-header>
        <mat-card-title>Datos personales</mat-card-title>
      </mat-card-header>
      <mat-card-content class="account__grid">
        <mat-form-field appearance="outline" class="account__full">
          <mat-label>Correo</mat-label>
          <input matInput type="email" [value]="email()" disabled />
          <mat-hint>Para cambiar tu correo, contáctanos.</mat-hint>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Nombre</mat-label>
          <input matInput type="text" formControlName="full_name" autocomplete="name" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Teléfono</mat-label>
          <input matInput type="tel" formControlName="phone" autocomplete="tel" />
          <mat-hint>Útil para coordinar el SINPE de tus pedidos.</mat-hint>
        </mat-form-field>
      </mat-card-content>
    </mat-card>

    <mat-card class="account__panel account__placeholder">
      <mat-card-header>
        <mat-card-title>Dirección de envío</mat-card-title>
        <mat-card-subtitle>Disponible al activar el checkout</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p class="muted">
          Pronto podrás guardar una dirección por defecto para acelerar tus pedidos.
        </p>
        <button mat-stroked-button type="button" disabled>Editar dirección</button>
      </mat-card-content>
    </mat-card>

    <div class="account__actions">
      <button
        mat-stroked-button
        type="button"
        color="warn"
        (click)="signOut()"
      >
        <mat-icon>logout</mat-icon>
        Cerrar sesión
      </button>
      <button
        mat-flat-button
        color="primary"
        type="submit"
        [disabled]="form.invalid || form.pristine || saving()"
      >
        Guardar cambios
      </button>
    </div>
  </form>
</section>
