<nav class="breadcrumb" aria-label="Breadcrumb">
  <a routerLink="/" class="breadcrumb-home" aria-label="Inicio">
    <mat-icon>home</mat-icon>
  </a>
  <span class="breadcrumb-sep">›</span>
  <span class="breadcrumb-current">{{ pageTitle() }}</span>
</nav>

<header class="cards-header">
  <h1>{{ pageTitle() }}</h1>
  <p class="lead">{{ pageLead() }}</p>
</header>

<app-filters-bar
  [anyActive]="anyFilterActive()"
  (clearAll)="onClearAllFilters()"
>
  @if (showCategoryFilter()) {
    <app-category-filter
      [categories]="categoriesForFilter()"
      [counts]="categoryCounts()"
      [selected]="categoria() ?? null"
      (selectionChange)="onCategoryChange($event)"
    />
  }
  <app-set-filter
    [sets]="allSets()"
    [counts]="setCounts()"
    [selected]="selectedSetIds()"
    [hideZero]="onSaleOnly() || !!effectiveCategorySlug()"
    (selectionChange)="onSetsChange($event)"
  />
  @if (showCardTypeFilter()) {
    <app-card-type-filter
      [label]="cardTypeFilterLabel()"
      [cardTypes]="cardTypeFilterTypes()"
      [counts]="cardTypeCounts()"
      [selected]="selectedCardTypeIds()"
      [hideZero]="onSaleOnly() || !!effectiveCategorySlug()"
      (selectionChange)="onCardTypesChange($event)"
    />
  }
  <app-sort-select
    bar-end
    [value]="normalizedSort()"
    (sortChange)="onSortChange($event)"
  />
</app-filters-bar>

@if (loading()) {
  <mat-progress-bar mode="indeterminate" />
}

@if (!loading() && cards().length === 0) {
  <p class="cards-empty">{{ emptyText() }}</p>
}

<div class="cards-grid">
  @for (card of cards(); track card.id) {
    <app-product-card [card]="card" />
  }
</div>
