<div class="brand-bar"></div>

<mat-toolbar class="app-header">
  <div class="header-left">
    <button mat-icon-button (click)="toggleNav.emit()" aria-label="Toggle navigation">
      <mat-icon>menu</mat-icon>
    </button>
    <a routerLink="/" class="brand" aria-label="Poke-Singles">
      <img src="assets/images/poke-singles-logo.png" alt="" class="brand-logo" />
      <span class="brand-eyebrow brand-eyebrow--inline">Poke-Singles</span>
    </a>
  </div>
  <div class="search-field">
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <input matInput placeholder="Buscar cartas…" #searchInput (keyup.enter)="onSearch(searchInput.value)" />
      <button matSuffix mat-icon-button aria-label="Buscar" (click)="onSearch(searchInput.value)">
        <mat-icon>search</mat-icon>
      </button>
    </mat-form-field>
    <button
      mat-icon-button
      type="button"
      class="search-help"
      aria-label="Ayuda de búsqueda"
      [matTooltip]="searchHelpText"
      matTooltipPosition="below"
      matTooltipClass="search-help-tooltip"
    >
      <mat-icon>help_outline</mat-icon>
    </button>
  </div>
  <div class="header-actions">
    <button
      mat-icon-button
      type="button"
      (click)="onCartClick()"
      aria-label="Carrito"
      class="cart-btn"
    >
      <mat-icon>shopping_cart</mat-icon>
      @if (cartCount() > 0) {
        <span class="cart-count">{{ cartCount() }}</span>
      }
    </button>

    @if (!isSignedIn()) {
      <button
        mat-icon-button
        type="button"
        (click)="openLogin()"
        aria-label="Iniciar sesión"
        class="header-profile-btn"
      >
        <mat-icon>person</mat-icon>
      </button>
    } @else {
      <div class="acct" [class.acct--open]="menuOpen()">
        <button
          type="button"
          class="acct-trigger"
          aria-haspopup="menu"
          [attr.aria-expanded]="menuOpen()"
          aria-label="Cuenta"
          (click)="toggleMenu()"
        >
          <span class="acct-avatar"><app-user-avatar /></span>
          <mat-icon class="acct-caret">expand_more</mat-icon>
        </button>

        @if (menuOpen()) {
          <div class="acct-backdrop" (click)="closeMenu()"></div>

          <div class="acct-pop" role="menu">
            <span class="acct-tip"></span>

            <!-- Identity -->
            <div class="acct-id">
              <span class="acct-id-avatar"><app-user-avatar /></span>
              <div class="acct-id-text">
                <div class="acct-id-name">{{ userDisplayName() }}</div>
                @if (currentUser()?.email; as email) {
                  <div class="acct-id-email">{{ email }}</div>
                }
              </div>
            </div>

            <!-- Poke-Coins -->
            <div class="acct-coins-wrap">
              <a routerLink="/account" class="acct-coins" (click)="closeMenu()">
                <img class="acct-coins-medal" src="assets/images/coin-sm.png" alt="" />
                <span class="acct-coins-text">
                  <span class="acct-coins-label brand-mono">Poke-Coins</span>
                  <span class="acct-coins-bal">
                    <span class="acct-coins-num">{{ points() }}</span>
                    <span class="acct-coins-unit">coins</span>
                  </span>
                </span>
                <span class="acct-coins-redeem brand-mono">
                  <mat-icon>redeem</mat-icon>
                  Canjear
                </span>
              </a>
            </div>

            <!-- Items -->
            <div class="acct-items">
              <a routerLink="/account" role="menuitem" class="acct-item" (click)="closeMenu()">
                <mat-icon class="acct-item-icon">account_circle</mat-icon>
                <span class="acct-item-label">Mi cuenta</span>
                <mat-icon class="acct-item-chev">chevron_right</mat-icon>
              </a>
              @if (isAdmin()) {
                <a routerLink="/admin" role="menuitem" class="acct-item" (click)="closeMenu()">
                  <mat-icon class="acct-item-icon">shield_person</mat-icon>
                  <span class="acct-item-label">Panel admin</span>
                  <mat-icon class="acct-item-chev">chevron_right</mat-icon>
                </a>
              }
              <div class="acct-divider"></div>
              <button
                type="button"
                role="menuitem"
                class="acct-item acct-item--danger"
                (click)="signOut()"
              >
                <mat-icon class="acct-item-icon">logout</mat-icon>
                <span class="acct-item-label">Cerrar sesión</span>
              </button>
            </div>
          </div>
        }
      </div>
    }

    <app-social-icons class="header-social" />

  </div>
</mat-toolbar>
