<div class="brand-bar"></div>

<mat-toolbar class="app-header">
  <div class="header-left">
    <button mat-icon-button (click)="toggleNav.emit()" aria-label="Toggle navigation">
      <mat-icon>menu</mat-icon>
    </button>
    <a routerLink="/" class="brand" aria-label="Poke-Singles">
      <img src="assets/images/poke-singles-logo.png" alt="" class="brand-logo" />
      <span class="brand-eyebrow brand-eyebrow--inline">Poke-Singles</span>
    </a>
  </div>
  <div class="search-field">
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <input matInput placeholder="Buscar cartas…" #searchInput (keyup.enter)="onSearch(searchInput.value)" />
      <button matSuffix mat-icon-button aria-label="Buscar" (click)="onSearch(searchInput.value)">
        <mat-icon>search</mat-icon>
      </button>
    </mat-form-field>
    <button
      mat-icon-button
      type="button"
      class="search-help"
      aria-label="Ayuda de búsqueda"
      [matTooltip]="searchHelpText"
      matTooltipPosition="below"
      matTooltipClass="search-help-tooltip"
    >
      <mat-icon>help_outline</mat-icon>
    </button>
  </div>
  <div class="header-actions">
    <button mat-icon-button routerLink="/cart" aria-label="Cart" class="cart-btn">
      <mat-icon>shopping_cart</mat-icon>
      <span class="cart-count">0</span>
    </button>

    <button
      mat-icon-button
      [matMenuTriggerFor]="profileMenu"
      [attr.aria-label]="isSignedIn() ? 'Cuenta' : 'Iniciar sesión'"
      class="header-profile-btn"
    >
      @if (isSignedIn()) {
        @if (userAvatarUrl(); as url) {
          <img [src]="url" alt="" class="header-avatar" referrerpolicy="no-referrer" />
        } @else {
          <span class="header-initials">{{ userInitials() }}</span>
        }
      } @else {
        <mat-icon>person</mat-icon>
      }
    </button>

    <mat-menu #profileMenu="matMenu" xPosition="before">
      @if (!isSignedIn()) {
        <button mat-menu-item (click)="openLogin()">
          <mat-icon>login</mat-icon>
          <span>Ingresar</span>
        </button>
      } @else {
        <div class="header-menu-user" mat-menu-item disabled>
          <span class="header-menu-name">{{ userDisplayName() }}</span>
          @if (isAdmin()) {
            <span class="header-menu-role brand-eyebrow">Admin</span>
          }
        </div>
        <a mat-menu-item routerLink="/account">
          <mat-icon>account_circle</mat-icon>
          <span>Mi cuenta</span>
        </a>
        @if (isAdmin()) {
          <a mat-menu-item routerLink="/admin">
            <mat-icon>shield_person</mat-icon>
            <span>Panel admin</span>
          </a>
        }
        <button mat-menu-item (click)="signOut()">
          <mat-icon>logout</mat-icon>
          <span>Cerrar sesión</span>
        </button>
      }
    </mat-menu>

    <div class="social-icons">
      <a mat-icon-button href="https://instagram.com" target="_blank" rel="noopener" aria-label="Instagram">
        <mat-icon svgIcon="instagram" />
      </a>
      <a mat-icon-button href="https://facebook.com" target="_blank" rel="noopener" aria-label="Facebook">
        <mat-icon svgIcon="facebook" />
      </a>
      <a mat-icon-button href="https://wa.me/50663452039" target="_blank" rel="noopener" aria-label="WhatsApp">
        <mat-icon svgIcon="whatsapp" />
      </a>
    </div>
  </div>
</mat-toolbar>
